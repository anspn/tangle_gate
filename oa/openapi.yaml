openapi: 3.1.0
info:
  title: IOTA Service API
  description: >
    REST API for IOTA DID (Decentralized Identifier) management, Verifiable
    Credentials/Presentations (VC/VP), TTY session recording, and on-chain
    notarization.
  version: 0.5.0
  contact:
    name: IOTA Service
  license:
    name: MIT

servers:
  - url: http://localhost:4000/api
    description: Local development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication (email/password and VP-based)
  - name: Identity
    description: DID management endpoints
  - name: Credentials
    description: Verifiable Credential issuance and VP creation
  - name: Sessions
    description: TTY session recording and notarization
  - name: Verify
    description: On-chain notarization verification

paths:
  # =========================================================================
  # Authentication
  # =========================================================================
  /auth/login:
    post:
      tags: [Authentication]
      summary: Email/password login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/challenge:
    get:
      tags: [Authentication]
      summary: Get a challenge nonce for VP-based auth
      operationId: getChallenge
      responses:
        '200':
          description: Challenge generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    description: 32-byte hex challenge nonce (single-use, 5-min TTL)
                  expires_in_seconds:
                    type: integer
                    example: 300
                  message:
                    type: string

  /auth/present:
    post:
      tags: [Authentication]
      summary: Authenticate with a pre-built Verifiable Presentation
      operationId: presentVP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresentVPRequest'
      responses:
        '200':
          description: VP verified, JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VPLoginResponse'
        '401':
          description: Invalid challenge, VP, or credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Server DID not provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/present-with-credential:
    post:
      tags: [Authentication]
      summary: VP login from holder DID document + credential JWT
      description: >
        Creates a VP server-side from the holder's DID document (with keys)
        and a credential JWT, then verifies the VP for authentication.
        For unauthenticated users who don't have a session JWT yet.
      operationId: presentWithCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresentWithCredentialRequest'
      responses:
        '200':
          description: VP created, verified, JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VPLoginResponse'
        '401':
          description: Invalid challenge or VP verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: VP creation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # Identity
  # =========================================================================
  /dids:
    post:
      tags: [Identity]
      summary: Create a new DID
      operationId: createDid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDidRequest'
      responses:
        '201':
          description: DID created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DidResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dids/{did}:
    get:
      tags: [Identity]
      summary: Resolve a DID
      operationId: resolveDid
      security:
        - bearerAuth: []
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
        - name: identity_pkg_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: DID resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DidResponse'
        '404':
          description: DID not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /dids/{did}/revoke:
    post:
      tags: [Identity]
      summary: Deactivate a DID on-chain
      operationId: revokeDid
      security:
        - bearerAuth: []
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: DID deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeDidResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dids/validate:
    post:
      tags: [Identity]
      summary: Validate a DID on-chain
      operationId: validateDid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [did]
              properties:
                did:
                  type: string
                identity_pkg_id:
                  type: string
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  did:
                    type: string

  # =========================================================================
  # Credentials
  # =========================================================================
  /credentials/provision:
    post:
      tags: [Credentials]
      summary: Provision server DID (admin, one-time)
      operationId: provisionServerDid
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Server DID provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerDidResponse'
        '409':
          description: Already provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          $ref: '#/components/responses/Forbidden'

  /credentials/server-did:
    get:
      tags: [Credentials]
      summary: Get server DID info (admin)
      operationId: getServerDid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Server DID info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerDidResponse'
        '404':
          description: Not provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /credentials/issue:
    post:
      tags: [Credentials]
      summary: Issue a Verifiable Credential (admin)
      operationId: issueCredential
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCredentialRequest'
      responses:
        '201':
          description: Credential issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueCredentialResponse'
        '503':
          description: Server DID not provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          $ref: '#/components/responses/Forbidden'

  /credentials/create-presentation:
    post:
      tags: [Credentials]
      summary: Create a Verifiable Presentation (any authenticated user)
      operationId: createPresentation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresentationRequest'
      responses:
        '201':
          description: VP created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePresentationResponse'
        '422':
          description: VP creation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /credentials:
    get:
      tags: [Credentials]
      summary: List issued credentials (admin)
      operationId: listCredentials
      security:
        - bearerAuth: []
      parameters:
        - name: holder_did
          in: query
          schema:
            type: string
          description: Filter by holder DID
      responses:
        '200':
          description: Credential list
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentials:
                    type: array
                    items:
                      $ref: '#/components/schemas/CredentialMeta'
                  count:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'

  # =========================================================================
  # Sessions
  # =========================================================================
  /sessions:
    post:
      tags: [Sessions]
      summary: Start a recording session (VP required)
      operationId: startSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '201':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: Invalid challenge or VP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Server DID not provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [Sessions]
      summary: List sessions
      operationId: listSessions
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
        - name: did
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, ended, notarized, failed]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionResponse'
                  count:
                    type: integer

  /sessions/{id}/end:
    post:
      tags: [Sessions]
      summary: End a session (triggers notarization)
      operationId: endSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'

  /sessions/{id}:
    get:
      tags: [Sessions]
      summary: Get session details
      operationId: getSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'

  /sessions/{id}/download:
    get:
      tags: [Sessions]
      summary: Download session history as JSON
      operationId: downloadSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON file download
          content:
            application/json:
              schema:
                type: object

  /sessions/stats:
    get:
      tags: [Sessions]
      summary: Session statistics (admin)
      operationId: sessionStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  active:
                    type: integer
                  notarized:
                    type: integer
                  failed:
                    type: integer

  # =========================================================================
  # Verify (notarization)
  # =========================================================================
  /verify/{objectId}:
    get:
      tags: [Verify]
      summary: Read on-chain notarization
      operationId: readNotarization
      security:
        - bearerAuth: []
      parameters:
        - name: objectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: On-chain notarization data
          content:
            application/json:
              schema:
                type: object
                properties:
                  object_id:
                    type: string
                  state_data:
                    type: string
                  description:
                    type: string
                  immutable:
                    type: boolean

  /verify/hash:
    post:
      tags: [Verify]
      summary: Compute SHA-256 hash of data
      operationId: computeHash
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
      responses:
        '200':
          description: Hash result
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:
                    type: string

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  nif_loaded:
                    type: boolean

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login or VP-based auth

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions (requires admin role)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # -- Auth --
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    PresentVPRequest:
      type: object
      required: [presentation_jwt, challenge, holder_did]
      properties:
        presentation_jwt:
          type: string
          description: Signed VP JWT
        challenge:
          type: string
          description: Challenge nonce from GET /auth/challenge
        holder_did:
          type: string
          description: Holder's DID string

    PresentWithCredentialRequest:
      type: object
      required: [holder_doc_json, credential_jwt, challenge]
      properties:
        holder_doc_json:
          type: string
          description: Holder's DID document JSON (with private key material)
        credential_jwt:
          type: string
          description: TangleGateAccessCredential JWT
        challenge:
          type: string
          description: Challenge nonce from GET /auth/challenge

    VPLoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        holder_did:
          type: string
        credential_count:
          type: integer
        auth_method:
          type: string
          enum: [verifiable_presentation]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user, verifier]

    # -- Identity --
    CreateDidRequest:
      type: object
      properties:
        network:
          type: string
          enum: [iota, smr, rms, atoi]
          default: iota
        publish:
          type: boolean
          default: false

    DidResponse:
      type: object
      properties:
        did:
          type: string
          pattern: '^did:iota(:[a-z]+)?:0x[a-fA-F0-9]+$'
        network:
          type: string
        document:
          type: object
          additionalProperties: true

    RevokeDidResponse:
      type: object
      properties:
        did:
          type: string
        message:
          type: string

    # -- Credentials --
    ServerDidResponse:
      type: object
      properties:
        did:
          type: string
        network:
          type: string
        verification_method_fragment:
          type: string
        published_at:
          type: string
          format: date-time

    IssueCredentialRequest:
      type: object
      required: [holder_did]
      properties:
        holder_did:
          type: string
          description: Subject/holder DID
        claims:
          type: object
          additionalProperties: true
          description: Claims to include in the VC
        credential_type:
          type: string
          default: TangleGateAccessCredential
        role:
          type: string
          description: Shorthand — merged into claims.role

    IssueCredentialResponse:
      type: object
      properties:
        credential_jwt:
          type: string
          description: The signed VC JWT (give to the holder)
        issuer_did:
          type: string
        subject_did:
          type: string
        credential_type:
          type: string
        message:
          type: string

    CreatePresentationRequest:
      type: object
      required: [holder_doc_json, credential_jwts, challenge]
      properties:
        holder_doc_json:
          type: string
          description: Holder's DID document JSON (with private key material)
        credential_jwts:
          type: array
          items:
            type: string
          description: Array of credential JWT strings to include in the VP
        challenge:
          type: string
          description: Challenge nonce for replay protection
        expires_in:
          type: integer
          default: 600
          description: VP expiration in seconds

    CreatePresentationResponse:
      type: object
      properties:
        presentation_jwt:
          type: string
          description: Signed VP JWT
        holder_did:
          type: string
        message:
          type: string

    CredentialMeta:
      type: object
      properties:
        credential_id:
          type: string
        issuer_did:
          type: string
        holder_did:
          type: string
        credential_type:
          type: string
        issued_at:
          type: string
          format: date-time
        revoked:
          type: boolean

    # -- Sessions --
    StartSessionRequest:
      type: object
      required: [presentation_jwt, challenge, holder_did]
      properties:
        presentation_jwt:
          type: string
          description: Signed VP JWT containing a TangleGateAccessCredential
        challenge:
          type: string
          description: Challenge nonce from GET /auth/challenge
        holder_did:
          type: string
          description: Holder's DID string

    SessionResponse:
      type: object
      properties:
        session_id:
          type: string
        did:
          type: string
        user_id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, ended, notarized, failed]
        command_count:
          type: integer
        notarization_hash:
          type: string
          nullable: true
        on_chain_id:
          type: string
          nullable: true
        commands:
          type: array
          items:
            type: object
            properties:
              command:
                type: string
              timestamp:
                type: string

    # -- Common --
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

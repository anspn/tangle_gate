<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Shield gradient: accent-blue -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0090e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow for tangle nodes -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow for the shield -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#shieldGrad)" stroke="#007fd4" stroke-width="2" stroke-opacity="0.35"/>

  <!-- Shield shape -->
  <path d="M256 60 L408 138 L408 290 Q408 400 256 465 Q104 400 104 290 L104 138 Z"
        fill="#1d1f27" stroke="#808080" stroke-width="2.5" filter="url(#shadow)" opacity="0.92"/>

  <!-- ============================================================ -->
  <!-- SWORDS OF REVEALING LIGHT: 3 luminous swords descending     -->
  <!-- ============================================================ -->

  <!-- Sword glow aura filter -->
  <defs>
    <filter id="swordGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="swordBlade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="40%" style="stop-color:#05cc93;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#05cc93;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- LEFT SWORD (angled right, pointing down) -->
  <g transform="translate(195, 260) rotate(-12)" opacity="0.92">
    <!-- Blade -->
    <polygon points="0,-128 -9,-40 0,128 9,-40" fill="url(#swordBlade)" stroke="#05cc93" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Fuller (center line) -->
    <line x1="0" y1="-112" x2="0" y2="112" stroke="#ffffff" stroke-width="1.8" opacity="0.4"/>
    <!-- Guard (crosspiece) -->
    <rect x="-26" y="-42" width="52" height="8" rx="3" fill="#05cc93" opacity="0.85"/>
    <!-- Guard gems -->
    <circle cx="-21" cy="-38" r="3.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="21" cy="-38" r="3.5" fill="#ffffff" opacity="0.7"/>
    <!-- Grip -->
    <rect x="-5" y="-68" width="10" height="28" rx="3" fill="#05cc93" opacity="0.7"/>
    <!-- Grip wrap lines -->
    <line x1="-5" y1="-58" x2="5" y2="-58" stroke="#007fd4" stroke-width="1.2" opacity="0.5"/>
    <line x1="-5" y1="-50" x2="5" y2="-50" stroke="#007fd4" stroke-width="1.2" opacity="0.5"/>
    <!-- Pommel -->
    <circle cx="0" cy="-72" r="6" fill="#05cc93" opacity="0.8"/>
    <circle cx="0" cy="-72" r="3" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- CENTER SWORD (vertical, pointing straight down) -->
  <g transform="translate(256, 255)" opacity="0.95">
    <!-- Blade -->
    <polygon points="0,-136 -10,-40 0,140 10,-40" fill="url(#swordBlade)" stroke="#05cc93" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Fuller -->
    <line x1="0" y1="-120" x2="0" y2="124" stroke="#ffffff" stroke-width="2" opacity="0.45"/>
    <!-- Guard -->
    <rect x="-30" y="-44" width="60" height="9" rx="3" fill="#05cc93" opacity="0.88"/>
    <!-- Guard gems -->
    <circle cx="-24" cy="-39.5" r="4" fill="#ffffff" opacity="0.75"/>
    <circle cx="24" cy="-39.5" r="4" fill="#ffffff" opacity="0.75"/>
    <!-- Grip -->
    <rect x="-6" y="-74" width="12" height="32" rx="3" fill="#05cc93" opacity="0.75"/>
    <!-- Grip wraps -->
    <line x1="-6" y1="-62" x2="6" y2="-62" stroke="#007fd4" stroke-width="1.4" opacity="0.5"/>
    <line x1="-6" y1="-52" x2="6" y2="-52" stroke="#007fd4" stroke-width="1.4" opacity="0.5"/>
    <!-- Pommel -->
    <circle cx="0" cy="-78" r="7" fill="#05cc93" opacity="0.85"/>
    <circle cx="0" cy="-78" r="3.5" fill="#ffffff" opacity="0.65"/>
  </g>

  <!-- RIGHT SWORD (angled left, pointing down) -->
  <g transform="translate(317, 260) rotate(12)" opacity="0.92">
    <!-- Blade -->
    <polygon points="0,-128 -9,-40 0,128 9,-40" fill="url(#swordBlade)" stroke="#05cc93" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Fuller -->
    <line x1="0" y1="-112" x2="0" y2="112" stroke="#ffffff" stroke-width="1.8" opacity="0.4"/>
    <!-- Guard -->
    <rect x="-26" y="-42" width="52" height="8" rx="3" fill="#05cc93" opacity="0.85"/>
    <!-- Guard gems -->
    <circle cx="-21" cy="-38" r="3.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="21" cy="-38" r="3.5" fill="#ffffff" opacity="0.7"/>
    <!-- Grip -->
    <rect x="-5" y="-68" width="10" height="28" rx="3" fill="#05cc93" opacity="0.7"/>
    <!-- Grip wraps -->
    <line x1="-5" y1="-58" x2="5" y2="-58" stroke="#007fd4" stroke-width="1.2" opacity="0.5"/>
    <line x1="-5" y1="-50" x2="5" y2="-50" stroke="#007fd4" stroke-width="1.2" opacity="0.5"/>
    <!-- Pommel -->
    <circle cx="0" cy="-72" r="6" fill="#05cc93" opacity="0.8"/>
    <circle cx="0" cy="-72" r="3" fill="#ffffff" opacity="0.6"/>
  </g>

</svg>

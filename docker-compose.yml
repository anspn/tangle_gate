# =============================================================================
# Docker Compose for iota_service
# =============================================================================
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f app    # follow app logs
#   docker compose down            # stop all services
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iota_service
    env_file: .env
    volumes:
      # Shared session recording volume (app writes pending files, reads history)
      - session_data:/data/sessions
    environment:
      # Required vars validated at compose-up time
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}"
      # Default: IOTA testnet (override with IOTA_NODE_URL in .env for local node)
      IOTA_NODE_URL: "${IOTA_NODE_URL:-https://api.testnet.iota.cafe}"
      # MongoDB connection (internal Docker network)
      MONGO_URL: "mongodb://${MONGO_USERNAME:-iota}:${MONGO_PASSWORD}@mongo:27017/iota_service?authSource=admin"
      # Vault connection (internal Docker network)
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_ROOT_TOKEN}"
    networks:
      - iotanet
    dns: 1.1.1.1
    ports:
      - "${PORT:-4000}:4000"
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      vault:
        condition: service_healthy
      ttyd:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # MongoDB — Document store for notarization documents and session records
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: iota_mongo
    networks:
      - iotanet
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USERNAME:-iota}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}"
      MONGO_INITDB_DATABASE: iota_service
    ports:
      - "${MONGO_PORT:-27017}:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Vault — Secrets management (IOTA private keys, etc.)
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    container_name: iota_vault
    networks:
      - iotanet
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    environment:
      ## TODO configure sidecar vault agent to auto-unseal and manage tokens instead of using token in .env
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_ROOT_TOKEN:?Set VAULT_ROOT_TOKEN in .env}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "vault status || [ $? -eq 2 ]"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # ttyd — Web-based terminal accessible from the User Portal
  # Commands are recorded to the shared session volume for notarization.
  # ---------------------------------------------------------------------------
  ttyd:
    image: tsl0922/ttyd:latest
    networks:
      - iotanet
    container_name: iota_ttyd
    # Create the pending directory with world-writable permissions so the
    # Elixir app (non-root "iota" user) can write pending session files.
    # Then launch ttyd with the session recording shell script.
    command: >
      sh -c '
        mkdir -p /data/sessions/pending &&
        chmod 777 /data/sessions /data/sessions/pending &&
        exec ttyd --writable --port 7681 /data/scripts/session_shell.sh'
    volumes:
      # Shared session recording volume (shell writes history, reads pending files)
      - session_data:/data/sessions
      # Bind-mount the session shell script (read-only)
      - ./priv/scripts:/data/scripts:ro
    environment:
      SESSIONS_DIR: /data/sessions
    ports:
      - "${TTYD_PORT:-7681}:7681"
    restart: unless-stopped

volumes:
  session_data:
  mongo_data:
  vault_data:

networks:
  iotanet:
    name: iota_network
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.150.0/24
          gateway: 192.168.150.1
# =============================================================================
# Docker Compose for tangle_gate
# =============================================================================
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f app    # follow app logs
#   docker compose down            # stop all services
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tangle_gate
    env_file: .env
    volumes:
      # Shared session recording volume (app writes pending files, reads history)
      - session_data:/data/sessions
    environment:
      # Required vars validated at compose-up time
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}"
      # Default: IOTA testnet (override with IOTA_NODE_URL in .env for local node)
      IOTA_NODE_URL: "${IOTA_NODE_URL:-https://api.testnet.iota.cafe}"
      # MongoDB connection (internal Docker network)
      MONGO_URL: "mongodb://${MONGO_USERNAME:-iota}:${MONGO_PASSWORD}@mongo:27017/tangle_gate?authSource=admin"
      # Vault connection (internal Docker network)
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_ROOT_TOKEN}"
      # Agent microservice (internal Docker network — runs inside backend container)
      AGENT_URL: "http://backend:8800"
      AGENT_API_KEY: "${AGENT_API_KEY:?Set AGENT_API_KEY in .env}"
    networks:
      - tangle_gate_net
    dns: 1.1.1.1
    ports:
      - "${PORT:-4000}:4000"
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # MongoDB — Document store for notarization documents and session records
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: tangle_gate_mongo
    networks:
      - tangle_gate_net
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USERNAME:-iota}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}"
      MONGO_INITDB_DATABASE: tangle_gate
    ports:
      - "${MONGO_PORT:-27017}:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Vault — Secrets management (IOTA private keys, etc.)
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    container_name: tangle_gate_vault
    networks:
      - tangle_gate_net
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    environment:
      ## TODO configure sidecar vault agent to auto-unseal and manage tokens instead of using token in .env
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_ROOT_TOKEN:?Set VAULT_ROOT_TOKEN in .env}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "vault status || [ $? -eq 2 ]"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — systemd container with logind + sshd + ttyd + tangle_gate_agent
  # ---------------------------------------------------------------------------
  # Replaces the separate ttyd and agent containers. Runs systemd as PID 1
  # so that systemd-logind manages user sessions. SSH sessions go through
  # PAM → pam_systemd, making them visible to `loginctl`. The agent uses
  # `loginctl terminate-session` to reliably kick users out on admin request.
  #
  # Services inside the container:
  #   - systemd-logind  (session management)
  #   - sshd            (PAM-based login → logind registration)
  #   - ttyd            (web terminal wrapping SSH login)
  #   - tangle_gate_agent (credential verification + session termination)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tangle_gate_backend
    # systemd as PID 1 requires privileged mode and tmpfs on /run and /tmp.
    # cgroupns "host" gives the container access to the host cgroup hierarchy
    # which is required for systemd to work properly as PID 1.
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      # systemd needs cgroup filesystem
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # Shared session recording volume
      - session_data:/data/sessions
    environment:
      # Agent configuration (injected into systemd env file at boot)
      AGENT_API_KEY: "${AGENT_API_KEY:?Set AGENT_API_KEY in .env}"
      IOTA_NODE_URL: "${IOTA_NODE_URL:-https://api.testnet.iota.cafe}"
      IOTA_IDENTITY_PKG_ID: "${IOTA_IDENTITY_PKG_ID:-}"
      AGENT_PORT: "8800"
      # Full WebSocket URL the agent advertises in its health endpoint
      AGENT_WS_URL: "ws://backend:8800/ws/events"
      # Session user password (optional, default: sessionpass)
      SESSION_USER_PASSWORD: "${SESSION_USER_PASSWORD:-sessionpass}"
    networks:
      - tangle_gate_net
    dns: 1.1.1.1
    ports:
      # ttyd web terminal
      - "${TTYD_PORT:-7681}:7681"
      # Agent HTTP API
      - "${AGENT_PORT:-8800}:8800"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  session_data:
  mongo_data:
  vault_data:

networks:
  tangle_gate_net:
    name: tangle_gate_network
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.150.208/28
          gateway: 192.168.150.209